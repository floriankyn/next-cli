name: Release

# Build cross-platform binaries and attach them to a GitHub Release whenever a
# version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the GitHub Release once, up front. The build matrix below uploads
  # into it. (If each matrix job tried to create the release, they race and the
  # uploads fail with "release not found".)
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Builds the `next` binary for the target, packages it into a .tar.gz
      # (Unix) or .zip (Windows) alongside the README and LICENSE, generates a
      # SHA256 checksum, and uploads everything to the Release for this tag.
      # taiki-e's action auto-uses `cross` for targets that need it
      # (musl, aarch64-linux), so no extra toolchain setup is required.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: next
          target: ${{ matrix.target }}
          archive: next-$tag-$target
          include: README.md,LICENSE
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
